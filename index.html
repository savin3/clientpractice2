<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <title>My notes</title>
</head>
<body>
    <div id="app">
        <div class="app">
            <h1>My notes</h1>

            <add-card-form :all-cards="allCards" @card-created="addCard"></add-card-form>

            <div class="columns-container">
                <column-component
                v-for="col in columns"
                :key="col.id"
                :column-id="col.id"
                :all-cards="allCards"
                :is-blocked="isFirstColumnBlocked && col.id === 1"
                @move-to-column="moveCardToColumn"
                @set-completion-date="setCompletionDate"
                @percentage-changed="updatePercentage"
                @toggle-item="toggleItemInCard">
                </column-component>
            </div>
        </div>
    </div>
</body>
</html>
